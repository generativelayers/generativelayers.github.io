<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jason Runner | Generative Layers</title>
  <link rel="icon" href="/icon/icon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=3.6">
  <script>
    /* Platform config — shared modules read this */
    window.GL_PLATFORM = 'jason';
    window.GL_PLATFORM_CONFIG = {
      id: 'jason',
      label: 'Jason',
      sourceFolder: '/asl',
      auxFolder: null,
      sourceExt: '.asl',
      auxExt: null,
      sourceIcon: 'fa-file-code',
      auxIcon: null,
      buildFile: null,
      buildFileName: null,
      newSourceLabel: '+ ASL',
      newAuxLabel: null,
      storagePrefix: 'gl_runner_jason_',
      defaultFile: '/asl/main.asl',
      enabled: true
    };
  </script>
  <script defer src="js/search.js"></script>
  <script defer src="js/run-code-links.js?v=2"></script>
  <script defer src="js/code-runner-api-select.js?v=8"></script>
  <script defer src="js/code-runner-stop.js?v=3"></script>
  <style>
    /* Strip header/sidebar chrome when inside an iframe */
    .top, .side, .sidebar-backdrop { display: none !important; }
    .layout { display: block !important; }
    body { background: transparent !important; }
    body .main {
      max-width: 100% !important;
      width: 100% !important;
      padding: 0 4px !important;
      margin: 0 !important;
    }
    body .main > h1 { display: none !important; }

    #run-code { margin: 0; }

    .runner-card {
      background: var(--color-surface, #fff);
      border: 1px solid var(--color-border, #e5e7eb);
      border-radius: 14px;
      padding: 14px 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .06);
      max-width: none;
      width: 100%;
      margin-bottom: 2px
    }
    .runner-card h2{margin:0 0 8px;font-size:18px}

    .runner-project {
      display: grid;
      grid-template-columns: 195px minmax(0, 1fr);
      column-gap: 4px;
      row-gap: 14px;
      align-items: stretch
    }

    .runner-files {
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
      background: #0b1220;
      color: #d1fae5;
      min-height: auto;
      height: auto;
      align-self: stretch;
      box-sizing: border-box
    }

    .runner-files-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      font-size: 12px;
      font-weight: 800;
      color: #e5e7eb
    }

    .runner-file-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid #1f2937;
      background: #0f172a
    }

    .runner-mini-button {
      border: 1px solid rgba(52, 211, 153, .35);
      border-radius: 999px;
      background: rgba(52, 211, 153, .12);
      color: #34d399;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 9px;
      cursor: pointer
    }
    .runner-mini-button:hover {
      background: #059669;
      color: #fff;
      border-color: #059669
    }

    .runner-root { padding: 8px 6px; border-bottom: 1px solid #1f2937 }
    .runner-root-title { display: flex; align-items: center; gap: 8px; padding: 3px 4px 7px; color: #34d399; font-size: 12px; font-weight: 900 }
    .runner-file { display: flex; align-items: center; gap: 6px; width: 100%; border: 0; border-radius: 7px; background: transparent; color: #d1fae5; text-align: left; padding: 5px 6px; margin: 1px 0; cursor: pointer; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 11px; line-height: 1.25 }
    .runner-file:hover, .runner-file.active { background: #1f2937; color: #fff }
    .runner-files .runner-file { font-size: 12.5px }
    .runner-files .runner-root-title { font-size: 13px }
    .runner-files .runner-folder-name { font-size: 12.5px }
    .runner-empty-folder { padding: 4px 8px 8px; color: #64748b; font-size: 11px; font-style: italic }

    .runner-editor-wrap{min-width:0;display:flex;flex-direction:column;align-self:stretch;height:100%}.runner-current-file{display:flex;align-items:center;gap:8px;background:#111827;color:#e5e7eb;border:1px solid #1f2937;border-bottom:0;border-radius:12px 12px 0 0;padding:9px 13px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:13px;font-weight:800}.runner-editor,.runner-output{width:100%;box-sizing:border-box;margin:0;padding:16px;overflow:auto;background:#0b1220;color:#d1fae5;font-size:13px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}.runner-editor{flex:1;min-height:0;resize:vertical;border:1px solid #1f2937;border-radius:0 0 12px 12px;outline:none;white-space:pre;tab-size:4}.runner-editor:focus{border-color:var(--color-green-700,#059669);box-shadow:0 0 0 3px rgba(5,150,105,.18)}.runner-output{min-height:230px;white-space:pre-wrap;border-radius:12px;border:1px solid #1f2937;resize:both}

    .runner-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 10px 0 4px }
    .runner-button { display: inline-flex; align-items: center; gap: 9px; border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 800; cursor: pointer; color: #fff; background: var(--color-green-700, #059669); font-size: 13px }
    .runner-button:disabled { cursor: wait; opacity: .65 }
    .runner-secondary { color: var(--color-text, #111827); background: transparent; border: 1px solid var(--color-border, #e5e7eb) }
    .runner-status { font-size: 13px; font-weight: 800; color: var(--color-text-secondary, #4b5563) }
    .runner-meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin: 4px 0 0 }
    .runner-meta div { border: 1px solid var(--color-border, #e5e7eb); border-radius: 8px; padding: 6px 10px; font-size: 11px; color: var(--color-text-secondary, #4b5563) }
    .runner-meta strong { display: block; color: var(--color-text, #111827); font-size: 12px; margin-top: 2px }

    .runner-key-panel { border: 1px solid #e5e7eb; border-radius: 12px; background: #f8fafc; padding: 16px; margin: 14px 0 0 }
    .runner-key-panel[hidden] { display: none !important }

    @media(max-width:900px) {
      .runner-project { grid-template-columns: 1fr }
      .runner-files { min-height: auto }
      .runner-meta { grid-template-columns: 1fr }
    }
  </style>
</head>
<body>
  <!-- Minimal layout: no header/sidebar needed inside iframe -->
  <div class="layout">
    <main class="main">
      <section id="run-code">
        <div class="runner-card">
          <div class="runner-project">
            <div class="runner-files">
              <div class="runner-files-head"><span>Project files</span></div>
              <div class="runner-file-actions"><button class="runner-mini-button" id="newAstraFileButton"
                  type="button">+ ASL</button><button class="runner-mini-button" id="renameFileButton" type="button"><i
                    class="fa-solid fa-pen"></i></button><button class="runner-mini-button" id="deleteFileButton"
                  type="button"><i class="fa-solid fa-trash-can"></i></button></div>
              <div id="fileTree"></div>
            </div>
            <div class="runner-editor-wrap">
              <div class="runner-current-file"><i class="fa-regular fa-file-code"></i><span
                  id="currentFile">/asl/main.asl</span></div><textarea class="runner-editor" id="fileEditor"
                spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
            </div>
          </div>
          <div class="runner-toolbar"><button class="runner-button" id="runAstraButton" type="button"><i
                class="fa-solid fa-play"></i><span>Run Project</span></button><button
              class="runner-button runner-secondary" id="clearOutputButton" type="button"><i
                class="fa-solid fa-eraser"></i><span>Clear Output</span></button><span class="runner-status"
              id="runnerStatus">Ready</span></div>
          <div class="runner-meta">
            <div>Status<strong id="metaStatus">Idle</strong></div>
            <div>Return code<strong id="metaReturnCode">&mdash;</strong></div>
            <div>Elapsed<strong id="metaElapsed">&mdash;</strong></div>
          </div>
        </div>
        <div class="runner-card">
          <h2>Server output</h2>
          <pre class="runner-output"
            id="runnerOutput">Create or edit .asl files, then press "Run Project".</pre>
        </div>
      </section>
    </main>
  </div>
  <script>
  (() => {
    'use strict';
    const RUN_URL = 'https://code.generativelayers.com/api/run-jason';
    const CANCEL_URL = 'https://code.generativelayers.com/api/cancel-jason';
    const STORAGE_KEY = 'gl_runner_jason_project';
    const SOURCE_FOLDER = '/asl';
    const SOURCE_EXT = '.asl';
    const DEFAULT_FILE = '/asl/main.asl';

    const DEFAULT_SOURCE = [
      '// Jason Hello World with Generative Layers',
      '',
      '!start.',
      '',
      '+!start',
      '   <- .println("Hello from Jason on code.generativelayers.com");',
      '      .println("Generative Layers Jason adapter loaded.");',
      '      .stopMAS.'
    ].join('\n');

    let files = { [DEFAULT_FILE]: DEFAULT_SOURCE };
    let currentPath = DEFAULT_FILE;
    let runAbort = null;

    const $ = id => document.getElementById(id);

    const els = {
      tree: $('fileTree'), editor: $('fileEditor'), curFile: $('currentFile'),
      run: $('runAstraButton'), clear: $('clearOutputButton'), status: $('runnerStatus'),
      output: $('runnerOutput'), metaStatus: $('metaStatus'),
      metaCode: $('metaReturnCode'), metaElapsed: $('metaElapsed'),
    };

    // ── File tree ──
    function saveFile() {
      if (currentPath && files.hasOwnProperty(currentPath)) files[currentPath] = els.editor.value;
    }

    function openFile(path) {
      saveFile();
      currentPath = path;
      els.editor.value = files[path] || '';
      els.curFile.textContent = path;
      renderTree();
    }

    function renderTree() {
      saveFile();
      const aslFiles = Object.keys(files).filter(p => p.startsWith(SOURCE_FOLDER + '/')).sort();
      let html = '<div class="runner-root">';
      html += '<div class="runner-root-title"><i class="fa-solid fa-folder-open"></i> asl</div>';
      if (aslFiles.length === 0) html += '<div class="runner-empty-folder">empty</div>';
      for (const p of aslFiles) {
        const name = p.replace(SOURCE_FOLDER + '/', '');
        const active = p === currentPath ? ' active' : '';
        html += `<button type="button" class="runner-file${active}" data-path="${p}"><i class="fa-solid fa-file-code" style="color:#34d399"></i><span>${name}</span></button>`;
      }
      html += '</div>';
      els.tree.innerHTML = html;
      els.tree.querySelectorAll('[data-path]').forEach(btn => {
        btn.addEventListener('click', () => openFile(btn.dataset.path));
      });
    }

    // ── New file ──
    $('newAstraFileButton').addEventListener('click', () => {
      saveFile();
      const raw = prompt('New ASL file inside /asl', 'agent.asl');
      if (!raw) return;
      let name = raw.trim();
      if (!name.endsWith(SOURCE_EXT)) name += SOURCE_EXT;
      if (!/^[A-Za-z0-9_.-]+$/.test(name)) { alert('Invalid filename'); return; }
      const path = SOURCE_FOLDER + '/' + name;
      if (files.hasOwnProperty(path)) { alert('File already exists'); return; }
      const agentName = name.replace(SOURCE_EXT, '');
      files[path] = `// Agent: ${agentName}\n\n!start.\n\n+!start\n   <- .println("${agentName} started");\n      .stopMAS.\n`;
      currentPath = path;
      els.editor.value = files[path];
      els.curFile.textContent = path;
      renderTree();
      saveState();
    });

    // ── Rename file ──
    $('renameFileButton').addEventListener('click', () => {
      saveFile();
      if (!currentPath) return;
      const oldName = currentPath.split('/').pop();
      const raw = prompt('Rename file:', oldName);
      if (!raw || raw.trim() === oldName) return;
      let name = raw.trim();
      if (!name.endsWith(SOURCE_EXT)) name += SOURCE_EXT;
      if (!/^[A-Za-z0-9_.-]+$/.test(name)) { alert('Invalid filename'); return; }
      const newPath = SOURCE_FOLDER + '/' + name;
      if (files.hasOwnProperty(newPath)) { alert('File already exists'); return; }
      files[newPath] = files[currentPath];
      delete files[currentPath];
      currentPath = newPath;
      els.curFile.textContent = currentPath;
      renderTree();
      saveState();
    });

    // ── Delete file ──
    $('deleteFileButton').addEventListener('click', () => {
      saveFile();
      if (!currentPath || currentPath === DEFAULT_FILE) { alert('Cannot delete main.asl'); return; }
      if (!confirm(`Delete ${currentPath}?`)) return;
      delete files[currentPath];
      currentPath = Object.keys(files)[0] || DEFAULT_FILE;
      if (!files[currentPath]) files[currentPath] = DEFAULT_SOURCE;
      els.editor.value = files[currentPath];
      els.curFile.textContent = currentPath;
      renderTree();
      saveState();
    });

    // ── Build payload ──
    function buildPayload() {
      saveFile();
      const source = files[DEFAULT_FILE] || DEFAULT_SOURCE;
      const payload = { source, files: {}, api_keys: {} };

      // Additional .asl files
      for (const [path, content] of Object.entries(files)) {
        if (path === DEFAULT_FILE) continue;
        if (path.startsWith(SOURCE_FOLDER + '/')) {
          payload.files['src/main/asl/' + path.slice((SOURCE_FOLDER + '/').length)] = content;
        }
      }

      // Auto-generate mas2j
      const agents = Object.keys(files)
        .filter(p => p.startsWith(SOURCE_FOLDER + '/') && p.endsWith(SOURCE_EXT))
        .map(p => p.replace(SOURCE_FOLDER + '/', '').replace(SOURCE_EXT, ''));
      if (agents.length > 0) {
        const agentLines = agents.map(a => `        ${a};`).join('\n');
        payload.mas2j = `MAS default_project {\n    agents:\n${agentLines}\n    aslSourcePath: "src/main/asl";\n}\n`;
      }

      // API keys from the smart panel
      if (typeof window.__glGetApiKeys === 'function') {
        payload.api_keys = window.__glGetApiKeys();
      }

      return payload;
    }

    // ── Run ──
    let startTime = 0;
    async function runProject() {
      if (runAbort) { runAbort.abort(); runAbort = null; }

      els.run.disabled = true;
      els.status.textContent = 'Running...';
      els.metaStatus.textContent = 'Running';
      els.metaCode.textContent = '\u2014';
      els.metaElapsed.textContent = '\u2014';
      els.output.textContent = '';

      const payload = buildPayload();
      const controller = new AbortController();
      runAbort = controller;
      startTime = Date.now();
      window.__glRunStartTime = startTime;

      // Live elapsed timer
      if (window.__glElapsedTimer) clearInterval(window.__glElapsedTimer);
      window.__glElapsedTimer = setInterval(() => {
        if (startTime) els.metaElapsed.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      }, 200);

      try {
        const resp = await fetch(RUN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: controller.signal,
        });

        if (!resp.ok) {
          const text = await resp.text();
          els.output.textContent = `Error ${resp.status}: ${text}`;
          els.metaStatus.textContent = 'Error';
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('{"type":"meta"')) continue;
            els.output.textContent += line + '\n';
            els.output.scrollTop = els.output.scrollHeight;
          }
        }
        if (buffer) els.output.textContent += buffer;

        // Parse footer for status
        const text = els.output.textContent;
        const footerMatch = text.match(/--- (.+) ---\s*$/);
        if (footerMatch) {
          const footer = footerMatch[1];
          if (footer.startsWith('Completed')) {
            els.metaStatus.textContent = 'Completed';
            els.metaCode.textContent = '0';
          } else if (footer.startsWith('Exited with code')) {
            const code = footer.match(/code (\S+)/);
            const codeVal = code ? code[1] : '?';
            els.metaStatus.textContent = (codeVal === '0' || codeVal === 'None') ? 'Completed' : 'Failed';
            els.metaCode.textContent = codeVal;
          } else if (footer.startsWith('Timed out')) {
            els.metaStatus.textContent = 'Timed out';
          }
          const elapsed = footer.match(/([\d.]+)s/);
          if (elapsed) els.metaElapsed.textContent = elapsed[1] + 's';
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          els.output.textContent += '\n--- Cancelled ---\n';
          els.metaStatus.textContent = 'Cancelled';
        } else {
          els.output.textContent += '\nNetwork error: ' + err.message + '\n';
          els.metaStatus.textContent = 'Error';
        }
      } finally {
        els.run.disabled = false;
        els.status.textContent = 'Ready';
        runAbort = null;
        if (window.__glElapsedTimer) { clearInterval(window.__glElapsedTimer); window.__glElapsedTimer = null; }
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
        if (els.metaElapsed.textContent === '\u2014') els.metaElapsed.textContent = elapsed + 's';
      }
    }

    els.run.addEventListener('click', runProject);
    els.clear.addEventListener('click', () => {
      els.output.textContent = 'Create or edit .asl files, then press "Run Project".';
      els.metaStatus.textContent = 'Idle';
      els.metaCode.textContent = '\u2014';
      els.metaElapsed.textContent = '\u2014';
    });

    // ── Persistence ──
    function saveState() {
      saveFile();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ files, currentPath })); } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (data.files && Object.keys(data.files).length) {
            files = data.files;
            currentPath = data.currentPath || Object.keys(files)[0];
          }
        }
      } catch (e) {}
    }

    // Auto-save on changes
    els.editor.addEventListener('input', () => saveState());
    setInterval(saveState, 5000);

    // ── Parent message handling ──
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'gl-api-keys') {
        const keys = e.data.keys || {};
        document.querySelectorAll('[data-gl-key]').forEach(input => {
          if (keys[input.dataset.glEnv]) input.value = keys[input.dataset.glEnv];
        });
      }
      if (e.data && e.data.type === 'gl-load-code') {
        const payload = e.data.payload;
        if (payload && payload.source) {
          files = { [DEFAULT_FILE]: payload.source };
          if (payload.files) {
            for (const [rel, content] of Object.entries(payload.files)) {
              const m = rel.match(/src\/main\/asl\/(.+\.asl)$/);
              if (m) files[SOURCE_FOLDER + '/' + m[1]] = content;
            }
          }
          currentPath = DEFAULT_FILE;
          els.editor.value = files[currentPath];
          els.curFile.textContent = currentPath;
          renderTree();
          saveState();
        }
      }
    });

    // ── Load from hash (redirect from framework.html / patterns.html) ──
    function loadFromHash() {
      const hash = window.location.hash;
      if (!hash.startsWith('#load=')) return;
      try {
        const payload = JSON.parse(decodeURIComponent(hash.slice('#load='.length)));
        if (payload && payload.source) {
          files = { [DEFAULT_FILE]: payload.source };
          currentPath = DEFAULT_FILE;
          els.editor.value = files[currentPath];
          els.curFile.textContent = currentPath;
          renderTree();
          saveState();
        }
      } catch (e) { console.warn('Could not load from hash', e); }
    }

    // ── Expose GLRunner for external loading ──
    window.GLRunner = {
      loadSource(source, title) {
        files = { [DEFAULT_FILE]: source };
        currentPath = DEFAULT_FILE;
        els.editor.value = files[currentPath];
        els.curFile.textContent = currentPath;
        renderTree();
        saveState();
      }
    };

    // ── Init ──
    loadState();
    loadFromHash();
    els.editor.value = files[currentPath] || DEFAULT_SOURCE;
    els.curFile.textContent = currentPath;
    renderTree();
  })();
  </script>
</body>
</html>
