<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jason Runner | Generative Layers</title>
  <link rel="icon" href="/icon/icon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; }

    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }
    .coming-soon-icon {
      font-size: 64px;
      color: #34d399;
      opacity: 0.5;
    }
    .coming-soon h2 {
      font-size: 24px;
      font-weight: 800;
      color: var(--color-text, #111827);
      margin: 0;
    }
    .coming-soon p {
      font-size: 15px;
      color: var(--color-text-secondary, #4b5563);
      max-width: 500px;
      line-height: 1.7;
      margin: 0;
    }
    .coming-soon .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(52, 211, 153, .12);
      border: 1px solid rgba(52, 211, 153, .35);
      color: #059669;
      font-size: 13px;
      font-weight: 800;
    }
    .coming-soon a {
      color: #059669;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .runner-card {
      background: var(--color-surface, #fff);
      border: 1px solid var(--color-border, #e5e7eb);
      border-radius: 14px;
      padding: 14px 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .06);
      max-width: none;
      width: 100%;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <section id="run-code" style="padding: 16px;">
    <div class="runner-card">
      <div class="coming-soon">
        <i class="fa-solid fa-flask coming-soon-icon"></i>
        <h2>Jason Runner</h2>
        <div class="badge"><i class="fa-solid fa-clock"></i> Coming Soon</div>
        <p>
          The Jason online runner is under development. Jason uses Gradle-based builds which require
          a different backend pipeline.
        </p>
        <p>
          In the meantime, you can run Jason examples locally.
          See the <a href="https://github.com/generativelayers/examples/tree/main/jason" target="_blank" rel="noopener">Jason examples on GitHub</a>.
        </p>
      </div>
    </div>
  </section>
</body>
</html>
