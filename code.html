<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Run Code | Generative Layers</title><link rel="icon" href="/icon/icon.ico" type="image/x-icon"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="style.css?v=3.6"><script defer src="js/search.js"></script><script defer src="js/run-code-links.js?v=1"></script><style>.runner-card{background:var(--color-surface,#fff);border:1px solid var(--color-border,#e5e7eb);border-radius:14px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.06);max-width:1100px;margin-bottom:18px}.runner-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 16px}.runner-button{display:inline-flex;align-items:center;gap:9px;border:0;border-radius:10px;padding:12px 16px;font-weight:800;cursor:pointer;color:#fff;background:var(--color-green-700,#059669)}.runner-button:disabled{cursor:wait;opacity:.65}.runner-secondary{color:var(--color-text,#111827);background:transparent;border:1px solid var(--color-border,#e5e7eb)}.runner-status{font-size:14px;font-weight:800;color:var(--color-text-secondary,#4b5563)}.runner-editor,.runner-output{width:100%;box-sizing:border-box;margin:0;padding:16px;overflow:auto;border-radius:12px;background:#0b1220;color:#d1fae5;font-size:13px;line-height:1.55;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}.runner-editor{min-height:360px;resize:vertical;border:1px solid #1f2937;outline:none;white-space:pre;tab-size:4}.runner-editor:focus{border-color:var(--color-green-700,#059669);box-shadow:0 0 0 3px rgba(5,150,105,.18)}.runner-output{min-height:230px;white-space:pre-wrap}.runner-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0 0}.runner-meta div{border:1px solid var(--color-border,#e5e7eb);border-radius:10px;padding:10px;font-size:13px;color:var(--color-text-secondary,#4b5563)}.runner-meta strong{display:block;color:var(--color-text,#111827);font-size:14px;margin-top:3px}@media(max-width:720px){.runner-meta{grid-template-columns:1fr}}</style></head>
<body><header class="top"><div class="header-inner"><button class="menu-toggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button><img class="header-logo" src="/icon/logo.png" alt="Generative Layers" width="36" height="36"><div class="search-wrapper"><i class="fa-solid fa-magnifying-glass search-icon"></i><input class="search" placeholder="Search…" aria-label="Search"></div></div></header><div class="sidebar-backdrop" id="sidebarBackdrop"></div><div class="layout"><aside class="side" id="sidebar"><div class="side-label">Documentation</div><a href="index.html"><i class="fa-solid fa-house"></i><span>Introduction</span></a><a href="getting-started.html"><i class="fa-solid fa-rocket"></i><span>Getting Started</span></a><a href="framework.html"><i class="fa-solid fa-layer-group"></i><span>Framework</span></a><a href="patterns.html"><i class="fa-solid fa-shield-halved"></i><span>Patterns</span></a><a href="providers.html"><i class="fa-solid fa-plug"></i><span>Providers</span></a><a class="active" href="code.html"><i class="fa-solid fa-code"></i><span>Run Code</span></a><a href="research.html"><i class="fa-solid fa-microscope"></i><span>Research</span></a><a href="repositories.html"><i class="fa-brands fa-github"></i><span>Repositories</span></a></aside><main class="main"><h1>Run Code</h1><section id="run-code"><div class="runner-card"><h2><i class="fa-solid fa-code" style="margin-right:8px;color:var(--color-green-700);"></i>ASTRA Editor</h2><textarea class="runner-editor" id="astraSource" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">agent Main {
    module Console C;
    module System system;

    rule +!main(list args) {
        C.println("Hello from ASTRA on code.generativelayers.com");
        C.println("You can edit, paste, and run this ASTRA source.");
        system.exit();
    }
}</textarea><div class="runner-toolbar"><button class="runner-button" id="runAstraButton" type="button"><i class="fa-solid fa-play"></i><span>Run Source</span></button><button class="runner-button runner-secondary" id="loadExampleButton" type="button"><i class="fa-solid fa-rotate-left"></i><span>Load Example</span></button><button class="runner-button runner-secondary" id="clearOutputButton" type="button"><i class="fa-solid fa-eraser"></i><span>Clear Output</span></button><span class="runner-status" id="runnerStatus">Ready</span></div><div class="runner-meta"><div>Status<strong id="metaStatus">Idle</strong></div><div>Return code<strong id="metaReturnCode">—</strong></div><div>Elapsed<strong id="metaElapsed">—</strong></div></div></div><div class="runner-card"><h2>Server output</h2><pre class="runner-output" id="runnerOutput">Write or paste ASTRA source, then press “Run Source”.</pre></div></section></main></div><script>const sidebar=document.getElementById('sidebar');const sidebarBackdrop=document.getElementById('sidebarBackdrop');document.querySelector('.menu-toggle').addEventListener('click',function(){sidebar.classList.toggle('open');sidebarBackdrop.classList.toggle('open')});sidebarBackdrop.addEventListener('click',function(){sidebar.classList.remove('open');this.classList.remove('open')});const ASTRA_RUN_URL='https://code.generativelayers.com/api/run-astra';const DEFAULT_SOURCE=['agent Main {','    module Console C;','    module System system;','','    rule +!main(list args) {','        C.println("Hello from ASTRA on code.generativelayers.com");','        C.println("You can edit, paste, and run this ASTRA source.");','        system.exit();','    }','}'].join('\n');const sourceInput=document.getElementById('astraSource');const runButton=document.getElementById('runAstraButton');const loadExampleButton=document.getElementById('loadExampleButton');const clearButton=document.getElementById('clearOutputButton');const runnerStatus=document.getElementById('runnerStatus');const runnerOutput=document.getElementById('runnerOutput');const metaStatus=document.getElementById('metaStatus');const metaReturnCode=document.getElementById('metaReturnCode');const metaElapsed=document.getElementById('metaElapsed');sourceInput.value=DEFAULT_SOURCE;sourceInput.addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();const s=this.selectionStart;const end=this.selectionEnd;this.value=this.value.substring(0,s)+'    '+this.value.substring(end);this.selectionStart=this.selectionEnd=s+4}});function setRunning(v){runButton.disabled=v;loadExampleButton.disabled=v;runnerStatus.textContent=v?'Running…':'Ready'}function resetOutput(){metaStatus.textContent='Idle';metaReturnCode.textContent='—';metaElapsed.textContent='—';runnerOutput.textContent='Write or paste ASTRA source, then press “Run Source”.'}function norm(o){return o?String(o).replace(/\\n/g,'\n'):''}function render(d){metaStatus.textContent=d.status||'unknown';metaReturnCode.textContent=d.return_code??'—';metaElapsed.textContent=d.elapsed_seconds?`${d.elapsed_seconds}s`:'—';runnerOutput.textContent=norm(d.output)||JSON.stringify(d,null,2);runnerStatus.textContent=d.status==='completed'?'Completed':'Finished with problem'}runButton.addEventListener('click',async function(){const source=sourceInput.value.trim();if(!source){runnerStatus.textContent='No source';runnerOutput.textContent='Paste or write ASTRA source first.';return}setRunning(true);metaStatus.textContent='Running';metaReturnCode.textContent='—';metaElapsed.textContent='—';runnerOutput.textContent='Sending ASTRA source to the hosted runner…';try{const response=await fetch(ASTRA_RUN_URL,{method:'POST',mode:'cors',cache:'no-store',headers:{'Content-Type':'application/json'},body:JSON.stringify({source})});const text=await response.text();let data;try{data=JSON.parse(text)}catch{data={status:response.ok?'completed':'failed',return_code:response.status,elapsed_seconds:null,output:text}}if(!response.ok){data.status=data.status||'failed';data.return_code=data.return_code||response.status}render(data)}catch(error){metaStatus.textContent='Request failed';metaReturnCode.textContent='—';metaElapsed.textContent='—';runnerStatus.textContent='Failed';runnerOutput.textContent='The browser could not reach the hosted runner.\n\n'+error}finally{setRunning(false)}});loadExampleButton.addEventListener('click',function(){sourceInput.value=DEFAULT_SOURCE;sourceInput.focus();sourceInput.setSelectionRange(0,0);resetOutput();runnerStatus.textContent='Example loaded'});clearButton.addEventListener('click',resetOutput);</script></body></html>
