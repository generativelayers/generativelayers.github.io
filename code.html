<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run Code | Generative Layers</title>
  <meta name="description" content="Run ASTRA, Jason, and JaCaMo code in the browser with Generative Layers.">
  <link rel="icon" href="/icon/icon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=3.7">
  <script defer src="js/search.js?v=4"></script>
  <style>
    html,
    body {
      overflow-x: auto !important;
    }

    body .main {
      max-width: 1500px !important;
      width: 100% !important;
      padding-left: 4px !important;
      padding-right: 4px !important;
    }

    .main > h1 {
      padding-left: 60px;
    }

    .platform-tabs {
      display: flex;
      gap: 0;
      margin: 0;
      border-bottom: 2px solid var(--color-border, #e5e7eb);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .platform-tabs::-webkit-scrollbar {
      display: none;
    }

    .platform-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 800;
      color: var(--color-text-secondary, #6b7280);
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -2px;
      white-space: nowrap;
    }

    .platform-tab:hover {
      color: var(--color-text, #111827);
    }

    .platform-tab.active {
      color: #059669;
      border-bottom-color: #059669;
    }

    .platform-tab i {
      font-size: 16px;
    }

    .runner-frame-container {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      touch-action: pan-x pan-y;
    }

    .runner-frame {
      width: 100%;
      min-width: 100%;
      min-height: 500px;
      height: 900px;
      border: none;
      display: none;
    }

    .runner-frame.active {
      display: block;
    }

    @media(max-width:900px) {
      body .main {
        max-width: 100% !important;
      }

      .main > h1 {
        padding-left: 56px;
      }

      .platform-tab {
        padding: 10px 14px;
        font-size: 13px;
        flex: 0 0 auto;
      }

      .runner-frame-container {
        overflow-x: auto !important;
        overflow-y: hidden !important;
        -webkit-overflow-scrolling: touch !important;
        touch-action: pan-x pan-y !important;
      }

      .runner-frame {
        width: 920px !important;
        min-width: 920px !important;
        max-width: none !important;
      }
    }
  </style>
</head>

<body>
  <header class="top">
    <div class="header-inner">
      <button class="menu-toggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
      <img class="header-logo" src="/icon/logo.png" alt="Generative Layers" width="36" height="36">
      <div class="search-wrapper"><i class="fa-solid fa-magnifying-glass search-icon"></i><input class="search" placeholder="Search…" aria-label="Search"></div>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="layout">
    <aside class="side" id="sidebar">
      <div class="side-label">Documentation</div>
      <a href="index.html"><i class="fa-solid fa-house"></i><span>Introduction</span></a>
      <a href="getting-started.html"><i class="fa-solid fa-rocket"></i><span>Getting Started</span></a>
      <a href="framework.html"><i class="fa-solid fa-layer-group"></i><span>Framework</span></a>
      <a href="patterns.html"><i class="fa-solid fa-shield-halved"></i><span>Patterns</span></a>
      <a href="providers.html"><i class="fa-solid fa-plug"></i><span>Providers</span></a>
      <a class="active" href="code.html"><i class="fa-solid fa-code"></i><span>Run Code</span></a>
      <a href="research.html"><i class="fa-solid fa-microscope"></i><span>Research</span></a>
      <a href="repositories.html"><i class="fa-brands fa-github"></i><span>Repositories</span></a>
    </aside>

    <main class="main">
      <h1>Run Code</h1>

      <div class="platform-tabs" id="platformTabs">
        <button class="platform-tab active" data-platform="astra" type="button"><i class="fa-solid fa-robot"></i> ASTRA</button>
        <button class="platform-tab" data-platform="jason" type="button"><i class="fa-solid fa-flask"></i> Jason</button>
        <button class="platform-tab" data-platform="jacamo" type="button"><i class="fa-solid fa-cubes"></i> JaCaMo</button>
      </div>

      <div class="runner-frame-container" id="frameContainer">
        <iframe class="runner-frame active" id="frame-astra" src="runner-astra.html?v=archive-import-6" data-platform="astra"></iframe>
        <iframe class="runner-frame" id="frame-jason" data-platform="jason"></iframe>
        <iframe class="runner-frame" id="frame-jacamo" data-platform="jacamo"></iframe>
      </div>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');
    const frameContainer = document.getElementById('frameContainer');
    document.querySelector('.menu-toggle').addEventListener('click', function () {
      sidebar.classList.toggle('open');
      sidebarBackdrop.classList.toggle('open');
    });
    sidebarBackdrop.addEventListener('click', function () {
      sidebar.classList.remove('open');
      this.classList.remove('open');
    });

    const tabs = document.querySelectorAll('.platform-tab');
    const frames = document.querySelectorAll('.runner-frame');
    const frameSources = {
      astra: 'runner-astra.html?v=archive-import-6',
      jason: 'runner-jason.html?v=archive-import-6',
      jacamo: 'runner-jacamo.html?v=archive-import-6'
    };

    function isMobileRunner() {
      return window.matchMedia('(max-width:900px)').matches;
    }

    function syncFrameWidths() {
      frames.forEach(frame => {
        if (isMobileRunner()) {
          frame.style.width = '920px';
          frame.style.minWidth = '920px';
          frame.style.maxWidth = 'none';
        } else {
          frame.style.width = '100%';
          frame.style.minWidth = '100%';
          frame.style.maxWidth = '';
        }
      });
    }

    function injectFrameScript(doc, id, src, onload) {
      if (!doc || !doc.head) return;
      const existing = doc.getElementById(id);
      if (existing) {
        if (typeof onload === 'function') onload();
        return;
      }
      const script = doc.createElement('script');
      script.id = id;
      script.src = src;
      if (typeof onload === 'function') script.onload = onload;
      doc.head.appendChild(script);
    }

    function injectApiHudLoader(frame) {
      window.setTimeout(() => {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          const win = frame.contentWindow;
          if (!doc || !doc.head || !win) return;

          const runScan = () => {
            try {
              const editor = doc.getElementById('fileEditor');
              if (typeof win.__glResetApiPanel === 'function') win.__glResetApiPanel();
              if (editor) editor.dispatchEvent(new win.Event('input', { bubbles: true }));
            } catch (_) {}
          };

          injectFrameScript(doc, 'glApiSelectForcedLoader', 'js/code-runner-api-select.js?v=10', runScan);
          injectFrameScript(doc, 'glArchiveImportLoader', 'js/code-runner-archive-import.js?v=6');

          window.setTimeout(runScan, 500);
          window.setTimeout(runScan, 1200);
        } catch (_) {}
      }, 100);
    }

    function activatePlatform(platform) {
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.platform === platform));
      frames.forEach(frame => {
        const isActive = frame.dataset.platform === platform;
        frame.classList.toggle('active', isActive);
        if (isActive && !frame.src && frameSources[platform]) frame.src = frameSources[platform];
        if (isActive) injectApiHudLoader(frame);
      });
      syncFrameWidths();
      resizeFrames();
      frameContainer.scrollLeft = 0;
    }

    tabs.forEach(tab => tab.addEventListener('click', () => activatePlatform(tab.dataset.platform)));

    function resizeFrames() {
      syncFrameWidths();
      frames.forEach(frame => {
        if (!frame.classList.contains('active')) return;
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          if (doc && doc.body) {
            const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, 500);
            frame.style.height = h + 'px';
          }
        } catch (_) {}
      });
    }

    frames.forEach(frame => frame.addEventListener('load', () => {
      injectApiHudLoader(frame);
      setTimeout(resizeFrames, 250);
      setTimeout(resizeFrames, 1200);
    }));
    window.addEventListener('resize', resizeFrames);
    setInterval(resizeFrames, 2000);
    resizeFrames();

    const urlParams = new URLSearchParams(window.location.search);
    const requestedPlatform = urlParams.get('platform');
    if (requestedPlatform && frameSources[requestedPlatform]) activatePlatform(requestedPlatform);

    const hash = window.location.hash;
    if (hash.startsWith('#load-jason=')) {
      activatePlatform('jason');
      const jasonFrame = document.getElementById('frame-jason');
      if (jasonFrame) jasonFrame.src = 'runner-jason.html?v=archive-import-6#load=' + hash.slice('#load-jason='.length);
    } else if (hash.startsWith('#load-jacamo=')) {
      activatePlatform('jacamo');
      const jacamoFrame = document.getElementById('frame-jacamo');
      if (jacamoFrame) jacamoFrame.src = 'runner-jacamo.html?v=archive-import-6#load=' + hash.slice('#load-jacamo='.length);
    } else if (hash.startsWith('#load=')) {
      const astraFrame = document.getElementById('frame-astra');
      if (astraFrame) astraFrame.src = 'runner-astra.html?v=archive-import-6' + hash;
    }
  </script>
</body>

</html>
