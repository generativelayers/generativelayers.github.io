<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run Code | Generative Layers</title>
  <meta name="description" content="Run ASTRA, Jason, and JaCaMo code in the browser with Generative Layers.">
  <link rel="icon" href="/icon/icon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=3.6">
  <script defer src="js/search.js"></script>
  <style>
    body .main {
      max-width: 1500px !important;
      width: 100% !important;
      padding-left: 4px !important;
      padding-right: 4px !important
    }
    .main > h1 { padding-left: 60px }

    /* ── Platform tab bar ──────────────────────────── */
    .platform-tabs {
      display: flex;
      gap: 0;
      margin: 0 0 0;
      border-bottom: 2px solid var(--color-border, #e5e7eb);
    }
    .platform-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 800;
      color: var(--color-text-secondary, #6b7280);
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -2px;
    }
    .platform-tab:hover {
      color: var(--color-text, #111827);
    }
    .platform-tab.active {
      color: #059669;
      border-bottom-color: #059669;
    }
    .platform-tab i {
      font-size: 16px;
    }
    .platform-tab .tab-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(52, 211, 153, .12);
      color: #059669;
      letter-spacing: 0.5px;
    }

    /* ── Iframe container ─────────────────────────── */
    .runner-frame-container {
      width: 100%;
    }
    .runner-frame {
      width: 100%;
      min-height: 500px;
      height: 900px;
      border: none;
      display: none;
    }
    .runner-frame.active {
      display: block;
    }

    @media(max-width:900px) {
      body .main { max-width: 100% !important }
      .platform-tab { padding: 10px 14px; font-size: 13px }
    }
  </style>
</head>

<body>
  <header class="top">
    <div class="header-inner"><button class="menu-toggle" aria-label="Toggle menu"><i
          class="fa-solid fa-bars"></i></button><img class="header-logo" src="/icon/logo.png" alt="Generative Layers"
        width="36" height="36">
      <div class="search-wrapper"><i class="fa-solid fa-magnifying-glass search-icon"></i><input class="search"
          placeholder="Search…" aria-label="Search"></div>
    </div>
  </header>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="layout">
    <aside class="side" id="sidebar">
      <div class="side-label">Documentation</div><a href="index.html"><i
          class="fa-solid fa-house"></i><span>Introduction</span></a><a href="getting-started.html"><i
          class="fa-solid fa-rocket"></i><span>Getting Started</span></a><a href="framework.html"><i
          class="fa-solid fa-layer-group"></i><span>Framework</span></a><a href="patterns.html"><i
          class="fa-solid fa-shield-halved"></i><span>Patterns</span></a><a href="providers.html"><i
          class="fa-solid fa-plug"></i><span>Providers</span></a><a class="active" href="code.html"><i
          class="fa-solid fa-code"></i><span>Run Code</span></a><a href="research.html"><i
          class="fa-solid fa-microscope"></i><span>Research</span></a><a href="repositories.html"><i
          class="fa-brands fa-github"></i><span>Repositories</span></a>
    </aside>
    <main class="main">
      <h1>Run Code</h1>

      <!-- Platform tab bar -->
      <div class="platform-tabs" id="platformTabs">
        <button class="platform-tab active" data-platform="astra" type="button">
          <i class="fa-solid fa-robot"></i> ASTRA
        </button>
        <button class="platform-tab" data-platform="jason" type="button">
          <i class="fa-solid fa-flask"></i> Jason
          <span class="tab-badge">SOON</span>
        </button>
        <button class="platform-tab" data-platform="jacamo" type="button">
          <i class="fa-solid fa-cubes"></i> JaCaMo
          <span class="tab-badge">SOON</span>
        </button>
      </div>

      <!-- Isolated iframes -->
      <div class="runner-frame-container" id="frameContainer">
        <iframe class="runner-frame active" id="frame-astra" src="runner-astra.html" data-platform="astra"></iframe>
        <iframe class="runner-frame" id="frame-jason" data-platform="jason"></iframe>
        <iframe class="runner-frame" id="frame-jacamo" data-platform="jacamo"></iframe>
      </div>

    </main>
  </div>

  <script>
    // Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');
    document.querySelector('.menu-toggle').addEventListener('click', function () {
      sidebar.classList.toggle('open');
      sidebarBackdrop.classList.toggle('open');
    });
    sidebarBackdrop.addEventListener('click', function () {
      sidebar.classList.remove('open');
      this.classList.remove('open');
    });

    // Platform tab switching
    const tabs = document.querySelectorAll('.platform-tab');
    const frames = document.querySelectorAll('.runner-frame');
    const frameSources = {
      astra: 'runner-astra.html',
      jason: 'runner-jason.html',
      jacamo: 'runner-jacamo.html'
    };

    function activatePlatform(platform) {
      tabs.forEach(t => {
        t.classList.toggle('active', t.dataset.platform === platform);
      });
      frames.forEach(f => {
        const isActive = f.dataset.platform === platform;
        f.classList.toggle('active', isActive);
        // Lazy-load: only set src when first activated
        if (isActive && !f.src && frameSources[platform]) {
          f.src = frameSources[platform];
        }
      });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => activatePlatform(tab.dataset.platform));
    });

    // Auto-resize iframes to fit content
    function resizeFrames() {
      frames.forEach(f => {
        if (!f.classList.contains('active')) return;
        try {
          const doc = f.contentDocument || f.contentWindow.document;
          if (doc && doc.body) {
            const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, 500);
            f.style.height = h + 'px';
          }
        } catch (e) { /* cross-origin or not loaded yet */ }
      });
    }

    // Resize on load and periodically (content may change during runs)
    frames.forEach(f => f.addEventListener('load', () => setTimeout(resizeFrames, 200)));
    setInterval(resizeFrames, 2000);

    // Read ?platform= query param (from patterns.html "Run in Playground" links)
    const urlParams = new URLSearchParams(window.location.search);
    const requestedPlatform = urlParams.get('platform');
    if (requestedPlatform && frameSources[requestedPlatform]) {
      activatePlatform(requestedPlatform);
    }

    // Forward #load= hash to the ASTRA iframe for patterns.html integration
    if (window.location.hash.startsWith('#load=')) {
      const astraFrame = document.getElementById('frame-astra');
      // Append hash to iframe src so it loads with the payload
      if (astraFrame) {
        astraFrame.src = 'runner-astra.html' + window.location.hash;
      }
    }
  </script>
</body>

</html>
